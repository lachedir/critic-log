<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Critic Log">
<title>Critic Log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0e0e0f;
    --bg2: #161618;
    --bg3: #1e1e21;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0ede8;
    --text2: #8a8780;
    --text3: #4a4845;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.12);
    --accent-text: #0e0e0f;
    --warn: #f0a060;
    --warn-dim: rgba(240,160,96,0.1);
    --danger: #f06070;
    --danger-dim: rgba(240,96,112,0.1);
    --success: #60d0a0;
    --success-dim: rgba(96,208,160,0.1);
    --radius: 12px;
    --radius-sm: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  .app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Header */
  .header {
    padding: calc(var(--safe-top) + 16px) 20px 16px;
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-title {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--text2);
    text-transform: uppercase;
  }
  .header-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 3px 8px;
    border-radius: 100px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    padding: 12px 20px;
    gap: 6px;
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 8px 4px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .tab.active {
    background: var(--accent-dim);
    border-color: rgba(200,240,96,0.25);
    color: var(--accent);
    font-weight: 500;
  }

  /* Scroll area */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    padding-bottom: calc(var(--safe-bottom) + 20px);
  }

  /* Section labels */
  .label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 10px;
    margin-top: 20px;
  }
  .label:first-child { margin-top: 0; }

  /* Tap grids */
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .grid2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }

  .chip {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg2);
    padding: 11px 8px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    text-align: center;
    line-height: 1.5;
    transition: all 0.12s;
    user-select: none;
    -webkit-user-select: none;
  }
  .chip:active { transform: scale(0.96); }
  .chip .ic { display: block; font-size: 18px; margin-bottom: 3px; }
  .chip.on {
    border-color: rgba(200,240,96,0.3);
    background: var(--accent-dim);
    color: var(--accent);
  }
  .chip.on-warn {
    border-color: rgba(240,160,96,0.3);
    background: var(--warn-dim);
    color: var(--warn);
  }
  .chip.on-danger {
    border-color: rgba(240,96,112,0.3);
    background: var(--danger-dim);
    color: var(--danger);
  }

  /* Note */
  textarea {
    width: 100%;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    resize: none;
    min-height: 72px;
    line-height: 1.6;
  }
  textarea::placeholder { color: var(--text3); }
  textarea:focus { outline: none; border-color: var(--border2); }

  /* Log button */
  .log-btn {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    border: 0.5px solid rgba(200,240,96,0.3);
    border-radius: var(--radius);
    background: var(--accent-dim);
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: all 0.12s;
  }
  .log-btn:active { transform: scale(0.98); background: rgba(200,240,96,0.2); }

  /* Flash */
  .flash {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%) scale(0.9);
    background: var(--bg3);
    border: 0.5px solid var(--accent);
    border-radius: var(--radius);
    padding: 16px 28px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s;
    z-index: 100;
    letter-spacing: 0.06em;
  }
  .flash.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 10px;
    text-align: center;
  }
  .stat-n { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; color: var(--text); line-height: 1; }
  .stat-l { font-size: 11px; color: var(--text3); margin-top: 5px; }

  /* Entries */
  .entry {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .entry-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 100px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.03em;
  }
  .tag-t { background: var(--accent-dim); color: var(--accent); }
  .tag-f { background: var(--warn-dim); color: var(--warn); }
  .tag-d { background: var(--success-dim); color: var(--success); }
  .tag-fuse { background: var(--danger-dim); color: var(--danger); }
  .etime { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); white-space: nowrap; margin-top: 2px; }
  .enote { font-size: 13px; color: var(--text2); margin-top: 8px; line-height: 1.5; }
  .edate-sep { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.08em; margin: 16px 0 8px; text-transform: uppercase; }

  /* Patterns */
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-name { font-size: 12px; color: var(--text2); width: 120px; flex-shrink: 0; }
  .bar-bg { flex: 1; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 5px; border-radius: 3px; background: var(--accent); transition: width 0.5s cubic-bezier(.4,0,.2,1); }
  .bar-fill-warn { background: var(--warn); }
  .bar-n { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); min-width: 20px; text-align: right; }

  .defuse-box {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .defuse-pct { font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 500; color: var(--accent); }
  .defuse-label { font-size: 13px; color: var(--text2); line-height: 1.5; }

  .empty { text-align: center; color: var(--text3); font-size: 13px; padding: 40px 0; font-family: 'DM Mono', monospace; }

  .clear-btn {
    width: 100%;
    padding: 12px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--danger);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    margin-top: 24px;
    opacity: 0.6;
  }
  .clear-btn:active { opacity: 1; }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="header-title">Critic Log</span>
    <span class="header-count" id="h-count">0 today</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="show('capture')">Capture</button>
    <button class="tab" onclick="show('log')">Log</button>
    <button class="tab" onclick="show('patterns')">Patterns</button>
  </div>

  <!-- CAPTURE -->
  <div class="content" id="tab-capture">
    <div class="label">Who or what triggered it?</div>
    <div class="grid3" id="g-target">
      <button class="chip" onclick="pick('target',this,'Me')"><span class="ic">🪞</span>Me</button>
      <button class="chip" onclick="pick('target',this,'Others')"><span class="ic">👥</span>Others</button>
      <button class="chip" onclick="pick('target',this,'Work')"><span class="ic">💼</span>Work</button>
      <button class="chip" onclick="pick('target',this,'Partner')"><span class="ic">❤️</span>Partner</button>
      <button class="chip" onclick="pick('target',this,'World')"><span class="ic">🌍</span>World</button>
      <button class="chip" onclick="pick('target',this,'System')"><span class="ic">⚙️</span>System</button>
    </div>

    <div class="label">What flavor?</div>
    <div class="grid3" id="g-flavor">
      <button class="chip" onclick="pick('flavor',this,'Not enough')"><span class="ic">📉</span>Not enough</button>
      <button class="chip" onclick="pick('flavor',this,'Incompetence')"><span class="ic">🤦</span>Incompetence</button>
      <button class="chip" onclick="pick('flavor',this,'Disgust')"><span class="ic">😤</span>Disgust</button>
      <button class="chip" onclick="pick('flavor',this,'Should/must')"><span class="ic">☝️</span>Should/must</button>
      <button class="chip" onclick="pick('flavor',this,'Comparison')"><span class="ic">⚖️</span>Comparison</button>
      <button class="chip" onclick="pick('flavor',this,'Catastrophe')"><span class="ic">💥</span>Catastrophe</button>
    </div>

    <div class="label">Defusion move</div>
    <div class="grid2" id="g-defuse">
      <button class="chip" onclick="pick('defuse',this,'Named it')">Named it</button>
      <button class="chip" onclick="pick('defuse',this,'Noticed & moved on')">Noticed & moved on</button>
      <button class="chip" onclick="pick('defuse',this,'Said: critic talking')">Said "critic talking"</button>
      <button class="chip on-danger" onclick="pick('defuse',this,'Fused with it')">Fused with it</button>
    </div>

    <div class="label">Note (optional)</div>
    <textarea id="note" placeholder="One line — what set it off…"></textarea>

    <button class="log-btn" onclick="logEntry()">Log this moment</button>
  </div>

  <!-- LOG -->
  <div class="content hidden" id="tab-log">
    <div class="stats-grid">
      <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">today</div></div>
      <div class="stat"><div class="stat-n" id="s-def" style="color:var(--success)">0</div><div class="stat-l">defused</div></div>
      <div class="stat"><div class="stat-n" id="s-fus" style="color:var(--danger)">0</div><div class="stat-l">fused</div></div>
    </div>
    <div id="entries"></div>
  </div>

  <!-- PATTERNS -->
  <div class="content hidden" id="tab-patterns">
    <div class="defuse-box">
      <div class="defuse-pct" id="p-pct">—</div>
      <div class="defuse-label" id="p-label">Log a few entries with a defusion move to see your rate.</div>
    </div>
    <div class="label">Top targets</div>
    <div id="p-target"></div>
    <div class="label">Top flavors</div>
    <div id="p-flavor"></div>
    <div class="label" style="margin-top:28px;">All time</div>
    <div class="stats-grid">
      <div class="stat"><div class="stat-n" id="p-all">0</div><div class="stat-l">total entries</div></div>
      <div class="stat"><div class="stat-n" id="p-days">0</div><div class="stat-l">days tracked</div></div>
      <div class="stat"><div class="stat-n" id="p-avg">0</div><div class="stat-l">avg / day</div></div>
    </div>
    <button class="clear-btn" onclick="clearAll()">Clear all data</button>
  </div>
</div>

<div class="flash" id="flash">Logged ✓</div>

<script>
const KEY = 'critic-log-v1';
let state = { target: null, flavor: null, defuse: null };
let entries = [];

function load() {
  try { entries = JSON.parse(localStorage.getItem(KEY)) || []; } catch(e) { entries = []; }
}
function save() { localStorage.setItem(KEY, JSON.stringify(entries)); }
load();

function pick(field, btn, val) {
  const grid = document.getElementById('g-' + field);
  grid.querySelectorAll('.chip').forEach(b => {
    b.classList.remove('on','on-warn','on-danger');
    if (field === 'defuse' && b.textContent.includes('Fused')) b.classList.add('on-danger');
  });
  if (field === 'defuse' && val === 'Fused with it') {
    btn.classList.remove('on-danger');
    btn.classList.add('on-danger');
    btn.style.opacity = '1';
  }
  btn.classList.remove('on-danger');
  btn.classList.add(field === 'flavor' ? 'on-warn' : field === 'defuse' && val === 'Fused with it' ? 'on-danger' : 'on');
  if (field === 'defuse' && val === 'Fused with it') { btn.classList.remove('on'); btn.classList.add('on-danger'); }
  state[field] = val;
}

function logEntry() {
  if (!state.target && !state.flavor) { showFlash('Pick a target or flavor first'); return; }
  const now = new Date();
  entries.unshift({
    target: state.target,
    flavor: state.flavor,
    defuse: state.defuse,
    note: document.getElementById('note').value.trim(),
    time: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
    date: now.toLocaleDateString([], {month:'short', day:'numeric', year:'numeric'}),
    ts: now.getTime()
  });
  save();
  state = { target: null, flavor: null, defuse: null };
  document.getElementById('note').value = '';
  ['g-target','g-flavor','g-defuse'].forEach(id => {
    document.getElementById(id).querySelectorAll('.chip').forEach(b => {
      b.classList.remove('on','on-warn');
      if (b.textContent.includes('Fused')) { b.classList.remove('on-danger'); b.classList.add('on-danger'); }
      else b.classList.remove('on-danger');
    });
    const fusedBtn = document.querySelector('#g-defuse .chip:last-child');
    if (fusedBtn) { fusedBtn.classList.remove('on'); fusedBtn.classList.add('on-danger'); }
  });
  updateHeader();
  showFlash('Logged ✓');
}

function showFlash(msg) {
  const f = document.getElementById('flash');
  f.textContent = msg;
  f.classList.add('show');
  setTimeout(() => f.classList.remove('show'), 1200);
}

function todayStr() { return new Date().toLocaleDateString([], {month:'short', day:'numeric', year:'numeric'}); }

function updateHeader() {
  const today = entries.filter(e => e.date === todayStr()).length;
  document.getElementById('h-count').textContent = today + ' today';
}

function show(tab) {
  ['capture','log','patterns'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('hidden', t !== tab);
  });
  document.querySelectorAll('.tab').forEach((b,i) => {
    b.classList.toggle('active', ['capture','log','patterns'][i] === tab);
  });
  if (tab === 'log') renderLog();
  if (tab === 'patterns') renderPatterns();
}

function renderLog() {
  const today = entries.filter(e => e.date === todayStr());
  document.getElementById('s-total').textContent = today.length;
  document.getElementById('s-def').textContent = today.filter(e => e.defuse && e.defuse !== 'Fused with it').length;
  document.getElementById('s-fus').textContent = today.filter(e => e.defuse === 'Fused with it').length;

  const el = document.getElementById('entries');
  if (!entries.length) { el.innerHTML = '<div class="empty">no entries yet</div>'; return; }

  let html = '';
  let lastDate = '';
  entries.forEach(e => {
    if (e.date !== lastDate) {
      html += `<div class="edate-sep">${e.date}</div>`;
      lastDate = e.date;
    }
    const isFused = e.defuse === 'Fused with it';
    html += `<div class="entry">
      <div class="entry-top">
        <div class="tags">
          ${e.target ? `<span class="tag tag-t">${e.target}</span>` : ''}
          ${e.flavor ? `<span class="tag tag-f">${e.flavor}</span>` : ''}
          ${e.defuse ? `<span class="tag ${isFused ? 'tag-fuse' : 'tag-d'}">${e.defuse}</span>` : ''}
        </div>
        <span class="etime">${e.time}</span>
      </div>
      ${e.note ? `<div class="enote">${e.note}</div>` : ''}
    </div>`;
  });
  el.innerHTML = html;
}

function renderPatterns() {
  const targets = {}; const flavors = {};
  entries.forEach(e => {
    if (e.target) targets[e.target] = (targets[e.target]||0)+1;
    if (e.flavor) flavors[e.flavor] = (flavors[e.flavor]||0)+1;
  });

  const withDefuse = entries.filter(e => e.defuse);
  const defused = withDefuse.filter(e => e.defuse !== 'Fused with it').length;
  const pct = withDefuse.length ? Math.round((defused/withDefuse.length)*100) : null;
  document.getElementById('p-pct').textContent = pct !== null ? pct + '%' : '—';
  document.getElementById('p-label').textContent = pct !== null
    ? `of tracked moments you defused the critic (${defused} of ${withDefuse.length})`
    : 'Log entries with a defusion move to see your rate.';

  renderBars('p-target', targets, false);
  renderBars('p-flavor', flavors, true);

  const days = new Set(entries.map(e => e.date)).size;
  document.getElementById('p-all').textContent = entries.length;
  document.getElementById('p-days').textContent = days;
  document.getElementById('p-avg').textContent = days ? Math.round(entries.length/days) : 0;
}

function renderBars(id, obj, warn) {
  const el = document.getElementById(id);
  const pairs = Object.entries(obj).sort((a,b)=>b[1]-a[1]);
  if (!pairs.length) { el.innerHTML = '<div class="empty" style="padding:12px 0;">no data yet</div>'; return; }
  const max = pairs[0][1];
  el.innerHTML = pairs.map(([k,v]) => `
    <div class="bar-row">
      <div class="bar-name">${k}</div>
      <div class="bar-bg"><div class="bar-fill ${warn?'bar-fill-warn':''}" style="width:${Math.round((v/max)*100)}%"></div></div>
      <div class="bar-n">${v}</div>
    </div>`).join('');
}

function clearAll() {
  if (confirm('Clear all entries? This cannot be undone.')) {
    entries = [];
    save();
    updateHeader();
    renderLog();
    renderPatterns();
  }
}

// Fix fused button initial state
document.querySelector('#g-defuse .chip:last-child').classList.add('on-danger');
document.querySelector('#g-defuse .chip:last-child').onclick = function() {
  document.getElementById('g-defuse').querySelectorAll('.chip').forEach(b => b.classList.remove('on','on-warn','on-danger'));
  this.classList.add('on-danger');
  state.defuse = 'Fused with it';
};

updateHeader();
</script>
</body>
</html>
